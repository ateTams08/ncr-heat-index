name: Daily Manila Weather Update

on:
  schedule:
    # Runs at 00:00 UTC every day (8:00 AM Manila Time)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-weather-data:
    runs-on: ubuntu-latest
  
    steps:
      # Step 1: Get the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up a fresh Python environment
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Step 3: Install the libraries from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the script securely
      - name: Run weather script
        env:
          # This securely injects Google Credentials into the script
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: python main.py